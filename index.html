<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>DSTA Blood Donation Drive</title>
        <link rel="stylesheet" href="styles.css" id="theme-stylesheet">
    </head>

    <body>
        <h1>DSTA Blood Donation Drive 2026</h1>
        <h2>Number of people in the queue now is</h2>
        <h3 id="queueCount"></h3>
        <br>
        <h4 onclick="location.reload(); return false;">
        <span class="refresh-text">Click here to refresh</span><br> (Note: Update might be delayed by 10 to 15 mins.)
        </h4>
        <script>
        // Auto-refresh when tab becomes visible again
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                setTimeout(() => location.reload(), 1000); 
            }
        });

        const SHEET_ID = '1ECvdqTCZRHXfeZW26xk5sobI0vrB8RTDwxzZH6PBUUI';
        const RANGE = 'A1';

        fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&range=${RANGE}`)
            .then(response => response.text())
            .then(text => {
                // Clean the value: remove quotes and trim
                const queueCount = text.trim().replace(/^"|"$/g, '');
                document.getElementById('queueCount').textContent = queueCount;

                // --- Switch stylesheet if the value is not a number ---
                const numericValue = parseFloat(queueCount);
                if (isNaN(numericValue)) {
                    // Not a number → apply style.css
                    document.getElementById('theme-stylesheet').href = 'style.css';
                }
                // If it's a number, keep styles.css (already set)
            })
            .catch(error => {
                console.error('Error fetching queue data:', error);
                document.getElementById('queueCount').textContent = '0';
                // Optionally fallback to a default stylesheet here
            });
        </script>
    </body>
</html>
